<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reset Password - FarmLink</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">Reset Your Password</h3>

                        <div id="message" class="alert d-none"></div>

                        <form id="resetForm">
                            <div class="mb-3">
                                <label class="form-label">New Password</label>
                                <input type="password" id="newPassword" class="form-control" required minlength="6">
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Confirm Password</label>
                                <input type="password" id="confirmPassword" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100 py-3">
                                Reset Password
                            </button>
                        </form>

                        <p class="text-center mt-4">
                            <a href="login.html">← Back to Login</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');

        if (!token || !email) {
            document.getElementById('message').className = 'alert alert-danger';
            document.getElementById('message').textContent = 'Invalid or missing reset link. Please request a new one.';
            document.getElementById('message').classList.remove('d-none');
            document.getElementById('resetForm').style.display = 'none';
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPass = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (newPass !== confirm) {
                alert("Passwords do not match");
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/api/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: token,
                        email: email,
                        new_password: newPass
                    })
                });

                const data = await res.json();

                const msgEl = document.getElementById('message');
                msgEl.classList.remove('d-none');

                if (data.ok) {
                    msgEl.className = 'alert alert-success';
                    msgEl.textContent = data.message;
                    setTimeout(() => location.href = 'login.html', 2200);
                } else {
                    msgEl.className = 'alert alert-danger';
                    msgEl.textContent = data.error || 'Failed to reset password';
                }
            } catch (err) {
                document.getElementById('message').className = 'alert alert-danger';
                document.getElementById('message').textContent = 'Network error – try again';
                document.getElementById('message').classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
