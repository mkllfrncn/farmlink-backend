<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FarmLink - Forgot Password</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="brand">
        <h1>🌱 FARMLINK</h1>
    </header>
    <div class="container">
        <main class="card">
            <h2 style="text-align: center;">Forgot Your Password?</h2>
            <p style="text-align: center; margin-bottom: 20px;">Enter your registered email below and we'll send you a link to reset your password.</p>
            <label>Email:</label>
            <input id="reset-email" type="email" placeholder="Enter registered email">
            <button id="send-link" class="btn-gold">📧 Send Reset Link</button>
            <button class="btn btn-secondary w-100 mt-3" onclick="location.href='login.html'">← Back to Login</button>
        </main>
    </div>
    <!-- <script src="cordova.js"></script> -->
    <script src="js/config.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/config.js"></script>

    <script src="js/config.js"></script>

<script>
    document.getElementById('send-link').addEventListener('click', async () => {
        const emailInput = document.getElementById('reset-email');
        const email = emailInput?.value?.trim();

        if (!email || !email.includes('@')) {
            alert("Please enter a valid email address");
            return;
        }

        const button = document.getElementById('send-link');
        const originalText = button.textContent;

        try {
            button.disabled = true;
            button.textContent = "Sending…";

            const response = await fetch(`${window.API_BASE}/api/forgot-password`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email })
            });

            let data;
            try {
                data = await response.json();
            } catch {
                throw new Error("Server sent unexpected response");
            }

            if (data.ok) {
                alert(
                    "If this email is registered, you should receive a password reset link shortly.\n\n" +
                    "Check your inbox and spam/junk folder."
                );
                // Optional: go back to login
                // setTimeout(() => location.href = 'login.html', 1200);
            } else {
                alert(data.error || "Could not process request right now");
            }

        } catch (err) {
            console.error(err);
            alert("Connection problem → " + (err.message || "try again later"));
        } finally {
            button.disabled = false;
            button.textContent = originalText;
        }
    });
</script>
</body>
</html>
